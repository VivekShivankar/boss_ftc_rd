<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - FTC Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#08090f;color:#dde4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:420px;padding:20px;}
.logo{text-align:center;margin-bottom:24px;}
.logo-box{width:46px;height:46px;background:linear-gradient(135deg,#4f7df3,#2563eb);border-radius:11px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;margin-bottom:10px;}
.logo-name{font-weight:800;font-size:1.1rem;}
.card{background:#0f1117;border:1px solid #1e2840;border-radius:18px;padding:28px;}
h2{font-weight:800;font-size:1.2rem;margin-bottom:4px;}
.sub{color:#5a6a8a;font-size:.82rem;margin-bottom:22px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:#5a6a8a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.fg input{width:100%;background:#08090f;border:1px solid #1e2840;border-radius:9px;padding:11px 13px;color:#dde4f0;font-size:.88rem;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:#4f7df3;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#4f7df3,#2563eb);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:4px;}
.btn:hover{opacity:.9;}
.msg{padding:9px 13px;border-radius:8px;font-size:.8rem;margin-bottom:14px;display:none;}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:#34d399;}
.msg.er{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;}
.back{text-align:center;margin-top:14px;font-size:.8rem;color:#5a6a8a;}
.back a{color:#4f7df3;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-box">FTC</div>
    <div class="logo-name">Reset Password</div>
  </div>
  <div class="card">
    <div id="msg" class="msg"></div>
    <h2>Set New Password</h2>
    <div class="sub">Enter your new password below</div>
    <div class="fg"><label>New Password</label><input type="password" id="np" placeholder="Min 6 characters"/></div>
    <div class="fg"><label>Confirm Password</label><input type="password" id="cp" placeholder="Repeat your password"/></div>
    <button class="btn" onclick="doReset()">Reset Password</button>
    <div class="back"><a href="/login.html">Back to Login</a></div>
  </div>
</div>
<script>
function token(){ return new URLSearchParams(location.search).get('token')||''; }
async function doReset(){
  var np=document.getElementById('np').value.trim();
  var cp=document.getElementById('cp').value.trim();
  if(!np||!cp){show('Please fill both fields.',true);return;}
  if(np!==cp){show('Passwords do not match.',true);return;}
  if(np.length<6){show('Password must be at least 6 characters.',true);return;}
  if(!token()){show('Invalid reset link.',true);return;}
  var fd=new FormData(); fd.append('token',token()); fd.append('newPassword',np);
  try{
    var r=await fetch('/api/auth/reset-password',{method:'POST',body:fd});
    var j=await r.json();
    show(j.message,!j.success);
    if(j.success) setTimeout(()=>location.href='/login.html',2000);
  }catch(e){show('Error: '+e.message,true);}
}
function show(t,e){var el=document.getElementById('msg');el.textContent=t;el.className='msg '+(e?'er':'ok');el.style.display='block';}
</script>
</body>
</html>
